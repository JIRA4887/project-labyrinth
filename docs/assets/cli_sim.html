<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Labyrinth CLI Demo</title>
    <style>
        body {
            background: #0a0e14;
            color: #a9b1d6;
            font-family: 'Courier New', Courier, monospace;
            margin: 0;
            padding: 20px;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        .terminal {
            background: #1a1b26;
            border: 1px solid #414868;
            border-radius: 8px;
            width: 800px;
            padding: 20px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
            position: relative;
        }

        .terminal-header {
            display: flex;
            gap: 8px;
            margin-bottom: 15px;
        }

        .dot {
            width: 12px;
            height: 12px;
            border-radius: 50%;
        }

        .red {
            background: #f7768e;
        }

        .yellow {
            background: #e0af68;
        }

        .green {
            background: #9ece6a;
        }

        .line {
            margin-bottom: 5px;
            opacity: 0;
        }

        .prompt {
            color: #bb9af7;
        }

        .cmd {
            color: #7aa2f7;
        }

        .success {
            color: #9ece6a;
        }

        .info {
            color: #e0af68;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(5px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .show {
            animation: fadeIn 0.3s forwards;
        }
    </style>
</head>

<body>
    <div class="terminal">
        <div class="terminal-header">
            <div class="dot red"></div>
            <div class="dot yellow"></div>
            <div class="dot green"></div>
        </div>
        <div id="content"></div>
    </div>

    <script>
        const lines = [
            { text: "$ ", type: "prompt", delay: 500, cmd: "pip install -e ." },
            { text: "Successfully installed labyrinth-memory-0.2.0", type: "success", delay: 1000 },
            { text: "$ ", type: "prompt", delay: 500, cmd: "labyrinth status" },
            { text: "Project Labyrinth v0.2.0 Status:", type: "info", delay: 500 },
            { text: "---------------------------------", type: "info", delay: 100 },
            { text: "L1 (Hot Context): [########--] 820/1024 tokens", type: "text", delay: 300 },
            { text: "L2 (Semantic Anchors): 14 active anchors", type: "text", delay: 200 },
            { text: "L3 (Persistent Store): 128 archived blocks", type: "text", delay: 200 },
            { text: "Active Backend: NumpyL3Backend (Local)", type: "success", delay: 400 },
            { text: "$ ", type: "prompt", delay: 800, cmd: "labyrinth demo" },
            { text: "Starting token optimization simulation...", type: "text", delay: 500 },
            { text: "Turn 1: RAW 1.2k -> LABYRINTH 420 tokens (65% Compression)", type: "success", delay: 600 },
            { text: "Turn 2: RAW 2.1k -> LABYRINTH 510 tokens (76% Compression)", type: "success", delay: 400 },
            { text: "Simulation complete. Check token_dashboard.html for full breakdown.", type: "text", delay: 500 }
        ];

        async function run() {
            const container = document.getElementById('content');
            for (const line of lines) {
                const div = document.createElement('div');
                div.className = 'line';

                if (line.type === 'prompt') {
                    div.innerHTML = `<span class="prompt">${line.text}</span><span class="cmd">${line.cmd}</span>`;
                } else {
                    div.className += ' ' + line.type;
                    div.innerText = line.text;
                }

                container.appendChild(div);
                await new Promise(r => setTimeout(r, line.delay));
                div.classList.add('show');
                window.scrollTo(0, document.body.scrollHeight);
            }
        }

        run();
    </script>
</body>

</html>
